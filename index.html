<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Room Inventory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Supply Room Inventory</h1>
            <p class="subtitle">Track and manage your supplies efficiently</p>
        </header>

        <div class="main-content">
            <!-- Add New Item Form -->
            <section class="add-item-section">
                <h2>Add New Item</h2>
                <form id="itemForm" class="item-form">
                    <div class="form-group">
                        <label for="itemName">Item Name *</label>
                        <input type="text" id="itemName" required placeholder="e.g., Pencils">
                    </div>
                    <div class="form-group">
                        <label for="itemQuantity">Quantity *</label>
                        <input type="number" id="itemQuantity" required min="1" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="itemCategory">Category</label>
                        <select id="itemCategory">
                            <option value="">Select Category</option>
                            <option value="Office Supplies">Office Supplies</option>
                            <option value="Cleaning">Cleaning</option>
                            <option value="Technology">Technology</option>
                            <option value="Tools">Tools</option>
                            <option value="Safety">Safety</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemMinThreshold">Minimum Threshold</label>
                        <input type="number" id="itemMinThreshold" min="0" placeholder="Alert when stock is below this">
                    </div>
                    <button type="submit" class="btn-primary">Add Item</button>
                </form>
            </section>

            <!-- Statistics -->
            <section class="stats-section">
                <div class="stat-card">
                    <h3 id="totalItems">0</h3>
                    <p>Total Items</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalQuantity">0</h3>
                    <p>Total Quantity</p>
                </div>
                <div class="stat-card alert">
                    <h3 id="lowStockCount">0</h3>
                    <p>Low Stock Items</p>
                </div>
            </section>

            <!-- Filters -->
            <section class="filter-section">
                <h2>Filters</h2>
                <div class="filter-controls">
                    <input type="text" id="searchInput" placeholder="Search items..." class="search-box">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Office Supplies">Office Supplies</option>
                        <option value="Cleaning">Cleaning</option>
                        <option value="Technology">Technology</option>
                        <option value="Tools">Tools</option>
                        <option value="Safety">Safety</option>
                        <option value="Other">Other</option>
                    </select>
                    <select id="statusFilter">
                        <option value="">All Items</option>
                        <option value="low">Low Stock Only</option>
                        <option value="in-stock">In Stock</option>
                    </select>
                </div>
            </section>

            <!-- Inventory List -->
            <section class="inventory-section">
                <h2>Inventory</h2>
                <div id="inventoryList" class="inventory-list">
                    <p class="empty-state">No items yet. Add your first supply above!</p>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
